<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAN Winder - Client</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.5);
            --success: #10b981;
            --text: #f8fafc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent 40%),
                              radial-gradient(circle at bottom left, #0c4a6e, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 5px; color: var(--accent); letter-spacing: 1px; }
        .subtitle { font-size: 12px; color: #94a3b8; margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase;}
        
        .mileage-display {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .mileage-val { font-size: 48px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1; }
        .mileage-label { font-size: 14px; font-weight: 300; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }
        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; font-size: 14px; color: #cbd5e1; margin-bottom: 8px; }
        .target-input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 18px;
            outline: none;
            transition: all 0.3s ease;
        }
        .target-input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .btn-connect { background: linear-gradient(135deg, #8b5cf6, #6d28d9); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); }
        .btn-connect:hover { box-shadow: 0 10px 25px rgba(139, 92, 246, 0.6); transform: translateY(-2px); }
        .btn-start { background: linear-gradient(135deg, #0ea5e9, #3b82f6); box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3); }
        .btn-start:hover { box-shadow: 0 10px 25px rgba(14, 165, 233, 0.6); transform: translateY(-2px); }
        .btn-stop { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3); }
        .btn-stop:hover { box-shadow: 0 10px 25px rgba(239, 68, 68, 0.6); transform: translateY(-2px); }
        
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 10px;
            background: rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .status-active { background: rgba(56, 189, 248, 0.2); color: var(--accent); border: 1px solid var(--accent); }
        .status-reached { background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid var(--success); }
        
        #controls { display: none; }
        
        /* Slider */
        input[type=range] { width: 100%; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="glass-panel">
        <h1>CAN Winder</h1>
        <div class="subtitle">Client Dashboard</div>

        <button id="connectBtn" class="btn btn-connect" onclick="connectBLE()">Connect to Device</button>
        
        <div id="controls">
            <div class="mileage-display">
                <div class="mileage-val" id="mileage">--</div>
                <div class="mileage-label">Current Mileage (km)</div>
            </div>

            <div class="input-group">
                <label>Add Kilometers (Optional)</label>
                <input type="number" id="delta" class="target-input" placeholder="e.g. 50">
            </div>

            <button id="toggleBtn" class="btn btn-start" onclick="toggleWinding()">START WINDING</button>
        </div>

        <div id="status" class="status-badge">Disconnected</div>
    </div>

    <script>
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const RX_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e"; 
        const TX_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e"; 

        let bleDevice, bleServer, rxCharacteristic, txCharacteristic;
        let isActive = false;

        async function connectBLE() {
            try {
                if (!navigator.bluetooth) { alert("Web Bluetooth is not supported."); return; }
                document.getElementById('status').innerText = 'Scanning...';
                bleDevice = await navigator.bluetooth.requestDevice({ filters: [{ name: 'CAN_Winder_Pro' }], optionalServices: [SERVICE_UUID] });
                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
                document.getElementById('status').innerText = 'Connecting...';
                bleServer = await bleDevice.gatt.connect();
                const service = await bleServer.getPrimaryService(SERVICE_UUID);
                txCharacteristic = await service.getCharacteristic(TX_UUID);
                rxCharacteristic = await service.getCharacteristic(RX_UUID);
                await txCharacteristic.startNotifications();
                txCharacteristic.addEventListener('characteristicvaluechanged', handleNotifications);
                
                document.getElementById('status').innerText = 'Connected';
                document.getElementById('status').className = 'status-badge status-active';
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('controls').style.display = 'block';
            } catch(error) {
                console.error(error);
                document.getElementById('status').innerText = 'Connection Failed';
            }
        }

        let rxBuffer = "";
        function handleNotifications(event) {
            let decoder = new TextDecoder('utf-8');
            rxBuffer += decoder.decode(event.target.value);
            
            // Ищем полные JSON объекты по символу '\n' (разделитель от ESP32)
            let newlineIdx;
            while ((newlineIdx = rxBuffer.indexOf('\n')) !== -1) {
                let line = rxBuffer.substring(0, newlineIdx).trim();
                rxBuffer = rxBuffer.substring(newlineIdx + 1);
                
                if (line.length === 0) continue;
                
                try {
                    const data = JSON.parse(line);
                    
                    // Обновляем пробег — только если он не 0 (защита от переходных состояний)
                    if (data.mileage !== undefined) {
                        document.getElementById('mileage').innerText = data.mileage > 0 ? data.mileage : '--';
                    }
                    
                    isActive = data.active;
                    const btn = document.getElementById('toggleBtn');
                    const status = document.getElementById('status');

                    if (data.reached) {
                        btn.className = 'btn btn-start';
                        btn.innerText = 'START WINDING';
                        status.className = 'status-badge status-reached';
                        status.innerText = 'TARGET REACHED! STOPPED. (Goal: ' + data.target + ')';
                    } else if (isActive) {
                        btn.className = 'btn btn-stop';
                        btn.innerText = 'STOP WINDING';
                        status.className = 'status-badge status-active';
                        let statusText = 'WINDING ACTIVE...';
                        if (data.target > 0) statusText += ' (Goal: ' + data.target + ')';
                        status.innerText = statusText;
                    } else {
                        btn.className = 'btn btn-start';
                        btn.innerText = 'START WINDING';
                        status.className = 'status-badge status-active';
                        status.innerText = 'Connected (Standby)';
                    }
                } catch (e) {
                    console.warn("BLE JSON parse error:", line);
                }
            }
        }

        function onDisconnected() {
            document.getElementById('status').innerText = 'Disconnected';
            document.getElementById('status').className = 'status-badge';
            document.getElementById('connectBtn').style.display = 'block';
            document.getElementById('controls').style.display = 'none';
            isActive = false;
        }

        async function sendCmd(cmdObj) {
            if (rxCharacteristic) {
                let encoder = new TextEncoder('utf-8');
                await rxCharacteristic.writeValue(encoder.encode(JSON.stringify(cmdObj)));
            }
        }

        function toggleWinding() {
            if (!isActive) {
                let deltaVal = parseInt(document.getElementById('delta').value);
                sendCmd({cmd: 'start', delta: isNaN(deltaVal) ? 0 : deltaVal});
            } else {
                sendCmd({cmd: 'stop'});
            }
        }
    </script>
</body>
</html>
